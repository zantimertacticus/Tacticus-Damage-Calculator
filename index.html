<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tacticus Damage Simulator</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Unofficial fan tool</p>
      <h1>Tacticus Damage Simulator</h1>
      <p class="subtitle">Expected damage, roll simulation, crit chains, block chains, terrain and pierce math.</p>
    </div>
    <div class="version">v0.5 beta</div>
  </header>

  <nav class="toolbar">
    <button id="savePresetBtn">Save Preset</button>
    <button id="loadPresetBtn">Load Preset</button>
    <button id="exportBtn">Export JSON</button>
    <label class="file-button">Import JSON<input id="importInput" type="file" accept="application/json"></label>
    <button id="clearBtn" class="danger">Clear</button>
  </nav>

  <main class="app-shell">
    <section class="panel" id="playerPanel"></section>
    <section class="panel" id="bossPanel"></section>

    <section class="panel simulation-panel">
      <h2>Simulation</h2>
      <div class="form-grid compact">
        <label>Rolls, 1–100 <input id="rollCount" type="number" min="1" max="100" value="100"></label>
        <label class="check"><input id="showLog" type="checkbox" checked> Show combat log</label>
        <label class="check"><input id="showChart" type="checkbox" checked> Show chart</label>
      </div>
      <div class="actions">
        <button id="calculateBtn" class="primary">Calculate</button>
        <button id="rollBtn">Roll Again</button>
      </div>
      <div id="validation" class="validation"></div>
    </section>

    <section class="panel results-panel">
      <h2>Results</h2>
      <div id="results"></div>
    </section>

    <section class="panel chart-panel">
      <h2>Player Damage Distribution</h2>
      <canvas id="damageChart" height="120"></canvas>
      <div id="chartFallback" class="histogram"></div>
    </section>

    <section class="panel log-panel">
      <details open>
        <summary>Combat Log: first roll for each attack</summary>
        <div id="combatLog" class="combat-log"></div>
      </details>
    </section>
  </main>

  <footer class="app-footer">Tacticus Damage Simulator · Static web app · GitHub Pages ready</footer>

  <script type="module" src="src/ui/app.js"></script>
</body>
</html>
